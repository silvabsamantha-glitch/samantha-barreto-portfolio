<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" role="img" aria-label="Visualização do case sobre cartão de crédito: o problema de um chatbot que não respondia a pergunta real do cliente, e três cenários de solução propostos, com e sem integração de API">
  <defs>
    <linearGradient id="bg07" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F1D30"/>
    </linearGradient>
    <linearGradient id="redCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A1A1A"/>
      <stop offset="100%" stop-color="#1F1414"/>
    </linearGradient>
    <linearGradient id="scenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2F44"/>
      <stop offset="100%" stop-color="#152438"/>
    </linearGradient>
    <linearGradient id="greenGrad07" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#0A5441"/>
    </linearGradient>
    <filter id="softShadow07">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow07" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#0F6E56" opacity="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bg07)"/>
  
  <!-- Grid -->
  <pattern id="grid07" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E3A5A" stroke-width="0.4" opacity="0.3"/>
  </pattern>
  <rect width="900" height="540" fill="url(#grid07)"/>

  <!-- Top accent -->
  <rect x="0" y="0" width="900" height="3" fill="url(#greenGrad07)"/>

  <!-- Header -->
  <rect x="0" y="3" width="900" height="80" fill="#0D1B2A" opacity="0.5"/>
  
  <rect x="44" y="22" width="188" height="22" rx="11" fill="#0F6E56" opacity="0.15"/>
  <rect x="44" y="22" width="188" height="22" rx="11" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.4"/>
  <text x="138" y="37.5" font-family="'Courier New', monospace" font-size="9.5" fill="#4DB896" text-anchor="middle" letter-spacing="1.5" font-weight="600">ESTUDO DE CASO · CASE 07</text>

  <text x="44" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">Cartão de crédito: a pergunta que não foi respondida</text>

  <!-- ── PROBLEM BLOCK ── -->
  <g filter="url(#softShadow07)">
    <rect x="44" y="105" width="350" height="175" rx="10" fill="url(#redCard)" stroke="#3A2020" stroke-width="1"/>
    <rect x="44" y="105" width="350" height="4" rx="2" fill="#8B3A3A"/>
  </g>

  <text x="60" y="128" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#C47070" letter-spacing="0.8" font-weight="400">O PROBLEMA</text>
  
  <!-- Chat simulation inside problem block -->
  <!-- User bubble -->
  <rect x="170" y="140" width="210" height="28" rx="14" fill="#2D1A1A"/>
  <rect x="170" y="140" width="210" height="28" rx="14" fill="none" stroke="#5A2A2A" stroke-width="0.8"/>
  <text x="275" y="158" font-family="'Courier New', monospace" font-size="10" fill="#DDA0A0" text-anchor="middle">"Quando chega meu cartão?"</text>

  <!-- Arrow down -->
  <line x1="275" y1="172" x2="275" y2="188" stroke="#5A2A2A" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.6"/>
  
  <!-- Bot bubble (wrong answer) -->
  <rect x="60" y="190" width="310" height="38" rx="10" fill="#1F1414"/>
  <rect x="60" y="190" width="310" height="38" rx="10" fill="none" stroke="#4A2020" stroke-width="0.8"/>
  <!-- X icon -->
  <circle cx="78" cy="209" r="8" fill="#3A1515"/>
  <line x1="74" y1="205" x2="82" y2="213" stroke="#C47070" stroke-width="1.5"/>
  <line x1="82" y1="205" x2="74" y2="213" stroke="#C47070" stroke-width="1.5"/>
  <text x="95" y="207" font-family="'Courier New', monospace" font-size="9" fill="#A06060">O prazo padrão de entrega</text>
  <text x="95" y="221" font-family="'Courier New', monospace" font-size="9" fill="#A06060">é de 7 a 10 dias úteis.</text>

  <!-- Same answer human -->
  <rect x="60" y="238" width="310" height="28" rx="8" fill="#1F1414" opacity="0.7"/>
  <text x="78" y="255" font-family="'Courier New', monospace" font-size="9" fill="#7A4A4A">Atendente humano: mesma resposta genérica.</text>

  <!-- Insight below problem -->
  <rect x="60" y="273" width="310" height="1" fill="#3A2020" opacity="0.5"/>
  <text x="275" y="257" font-family="Georgia, serif" font-size="9" fill="#8B5A5A" text-anchor="middle"></text>
  
  <!-- Key insight text inside problem block -->
  <rect x="60" y="278" width="310" height="1" fill="#3A2020"/>
  <text x="60" y="265" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#8B5A5A" font-style="italic">Ele perguntou quando chega</text>
  
  <!-- Rewrite: the key text properly -->
  <!-- Restructure: keep problem card and add text below -->

  <!-- Vertical divider -->
  <line x1="420" y1="105" x2="420" y2="450" stroke="#1E3A5A" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>
  
  <!-- ── "VS" label ── -->
  <circle cx="420" cy="193" r="22" fill="#0D1B2A" stroke="#1E3A5A" stroke-width="1"/>
  <text x="420" y="198" font-family="Georgia, serif" font-size="12" fill="#4DB896" text-anchor="middle" font-weight="700" opacity="0.7">vs</text>

  <!-- ── 3 SCENARIOS COLUMN ── -->
  <text x="460" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#4DB896" letter-spacing="0.8">TRÊS CAMINHOS POSSÍVEIS</text>

  <!-- Scenario A -->
  <g filter="url(#softShadow07)">
    <rect x="460" y="135" width="388" height="80" rx="8" fill="url(#scenGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="460" y="135" width="4" height="80" rx="2" fill="#0F6E56"/>
  </g>
  <text x="475" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="10.5" fill="#4DB896" letter-spacing="0.5" font-weight="600">Cenário A — Sem API</text>
  <text x="475" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#C8DDE6">Perguntar a data do pedido ao usuário</text>
  <text x="475" y="194" font-family="'Courier New', monospace" font-size="9" fill="#5A8A7A">+ rápido · sem integração · menos preciso</text>
  <!-- Bar indicator -->
  <rect x="796" y="148" width="40" height="6" rx="3" fill="#0F6E56" opacity="0.2"/>
  <rect x="796" y="148" width="20" height="6" rx="3" fill="#0F6E56" opacity="0.6"/>
  <text x="816" y="170" font-family="'Courier New', monospace" font-size="8" fill="#3A6A5A" text-anchor="middle">básico</text>

  <!-- Scenario B -->
  <g filter="url(#softShadow07)">
    <rect x="460" y="228" width="388" height="80" rx="8" fill="#122B20" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="460" y="228" width="4" height="80" rx="2" fill="#0F6E56"/>
  </g>
  <!-- recommended badge -->
  <rect x="760" y="236" width="82" height="18" rx="9" fill="#0F6E56"/>
  <text x="801" y="248.5" font-family="'Courier New', monospace" font-size="8.5" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">recomendado</text>
  <text x="475" y="251" font-family="Georgia, 'Times New Roman', serif" font-size="10.5" fill="#4DB896" letter-spacing="0.5" font-weight="600">Cenário B — Com API parcial</text>
  <text x="475" y="269" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#E8F4F0">Calcular prazo com data do pedido via sistema</text>
  <text x="475" y="287" font-family="'Courier New', monospace" font-size="9" fill="#5A8A7A">resposta personalizada · dados reais · moderado</text>

  <!-- Scenario C -->
  <g filter="url(#softShadow07)">
    <rect x="460" y="321" width="388" height="80" rx="8" fill="url(#scenGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="460" y="321" width="4" height="80" rx="2" fill="#4DB896" opacity="0.4"/>
  </g>
  <text x="475" y="344" font-family="Georgia, 'Times New Roman', serif" font-size="10.5" fill="#7ABCAA" letter-spacing="0.5" font-weight="600">Cenário C — API completa</text>
  <text x="475" y="362" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#C8DDE6">Rastreamento em tempo real + notificação proativa</text>
  <text x="475" y="380" font-family="'Courier New', monospace" font-size="9" fill="#3A7A6A">experiência ideal · alta integração · longo prazo</text>

  <!-- ── Bottom full-width insight ── -->
  <rect x="44" y="425" width="812" height="1" fill="#1E3A5A" opacity="0.6"/>
  <rect x="44" y="442" width="812" height="72" rx="8" fill="#0A1A28" opacity="0.8"/>
  <rect x="44" y="442" width="4" height="72" rx="2" fill="#0F6E56"/>

  <text x="62" y="467" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" fill="#9BB8C4" font-style="italic">O aprendizado do case</text>
  <text x="62" y="490" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" fill="#E8F4F0" letter-spacing="-0.2">"Um chatbot que falha no contexto de uso não falha por falta de conteúdo. Falha porque</text>
  <text x="62" y="508" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" fill="#4DB896" letter-spacing="-0.2">alguém projetou para o usuário imaginário, não para o usuário real."</text>

  <!-- Signature -->
  <text x="856" y="532" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#2A4A5A" text-anchor="end" letter-spacing="0.5">samantha silva · portfólio</text>
</svg>
