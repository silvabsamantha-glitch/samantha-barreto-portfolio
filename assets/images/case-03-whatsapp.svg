<svg width="720" height="420" viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Comparação antes e depois do chatbot de crédito PJ: antes com quatro mensagens sem responder a pergunta, depois com resposta direta em duas linhas">
  <title>Antes e depois — Chatbot Crédito PJ, Stone</title>

  <!-- Fundo -->
  <rect width="720" height="420" rx="12" fill="#F0F2F5"/>

  <!-- Label antes -->
  <circle cx="34" cy="30" r="5" fill="#A32D2D"/>
  <text x="44" y="34" font-family="DM Sans,sans-serif" font-size="10" fill="#A32D2D" font-weight="700" letter-spacing="1">ANTES</text>

  <!-- Label depois -->
  <circle cx="394" cy="30" r="5" fill="#0F6E56"/>
  <text x="404" y="34" font-family="DM Sans,sans-serif" font-size="10" fill="#0F6E56" font-weight="700" letter-spacing="1">DEPOIS</text>

  <!-- Divisor -->
  <line x1="360" y1="16" x2="360" y2="404" stroke="#D0D5DD" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ── ANTES: phone frame ── -->
  <rect x="20" y="48" width="320" height="360" rx="16" fill="#1a1a1a"/>
  <rect x="26" y="54" width="308" height="348" rx="12" fill="#ECE5DD"/>

  <!-- Header WhatsApp -->
  <rect x="26" y="54" width="308" height="40" rx="0" fill="#075E54"/>
  <rect x="26" y="54" width="308" height="8" rx="12" fill="#075E54"/>
  <rect x="26" y="62" width="308" height="32" fill="#075E54"/>
  <circle cx="50" cy="74" r="12" fill="#1A9B76"/>
  <text x="50" y="79" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#fff" font-weight="700">S</text>
  <text x="70" y="70" font-family="DM Sans,sans-serif" font-size="11" fill="#fff" font-weight="600">Stone Crédito</text>
  <circle cx="70" cy="80" r="3" fill="#25D366"/>
  <text x="78" y="84" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">online</text>

  <!-- Mensagens antes -->
  <!-- User -->
  <rect x="170" y="106" width="152" height="26" rx="6" fill="#DCF8C6"/>
  <text x="246" y="123" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#303030">Tenho empréstimo?</text>
  <text x="312" y="127" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- Bot response 1 -->
  <rect x="34" y="142" width="226" height="62" rx="6" fill="#fff"/>
  <text x="44" y="158" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">Sabemos que o empréstimo pode</text>
  <text x="44" y="172" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">fazer a diferença no seu negócio</text>
  <text x="44" y="186" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">e por isso estamos fazendo melhorias.</text>
  <text x="246" y="198" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- Bot response 2 -->
  <rect x="34" y="212" width="246" height="62" rx="6" fill="#fff"/>
  <text x="44" y="228" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">Por enquanto, apenas uma pequena</text>
  <text x="44" y="242" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">base de clientes tem o produto</text>
  <text x="44" y="256" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">disponível no momento.</text>
  <text x="266" y="268" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- Bot response 3 -->
  <rect x="34" y="282" width="256" height="46" rx="6" fill="#fff"/>
  <text x="44" y="298" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">Temos algumas dicas que podem</text>
  <text x="44" y="312" font-family="DM Sans,sans-serif" font-size="10" fill="#303030">te ajudar a aumentar suas chances...</text>
  <text x="276" y="322" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:15</text>

  <!-- User frustrado -->
  <rect x="140" y="338" width="182" height="26" rx="6" fill="#DCF8C6"/>
  <text x="231" y="355" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#7F1D1D" font-weight="500">Tenho ou não tenho?? 😤</text>
  <text x="312" y="359" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:15</text>

  <!-- Nota antes -->
  <rect x="26" y="380" width="308" height="26" rx="0" fill="rgba(163,45,45,0.08)"/>
  <rect x="26" y="380" width="308" height="26" rx="0 0 12 12" fill="rgba(163,45,45,0.08)"/>
  <text x="180" y="397" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#A32D2D">4 mensagens. Pergunta sem resposta.</text>

  <!-- ── DEPOIS: phone frame ── -->
  <rect x="380" y="48" width="320" height="360" rx="16" fill="#1a1a1a"/>
  <rect x="386" y="54" width="308" height="348" rx="12" fill="#ECE5DD"/>

  <!-- Header WhatsApp -->
  <rect x="386" y="54" width="308" height="40" rx="0" fill="#075E54"/>
  <rect x="386" y="54" width="308" height="8" rx="12" fill="#075E54"/>
  <rect x="386" y="62" width="308" height="32" fill="#075E54"/>
  <circle cx="410" cy="74" r="12" fill="#1A9B76"/>
  <text x="410" y="79" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#fff" font-weight="700">S</text>
  <text x="430" y="70" font-family="DM Sans,sans-serif" font-size="11" fill="#fff" font-weight="600">Stone Crédito</text>
  <circle cx="430" cy="80" r="3" fill="#25D366"/>
  <text x="438" y="84" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.7)">online</text>

  <!-- User -->
  <rect x="530" y="106" width="152" height="26" rx="6" fill="#DCF8C6"/>
  <text x="606" y="123" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#303030">Tenho empréstimo?</text>
  <text x="672" y="127" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- Bot resposta direta -->
  <rect x="394" y="142" width="230" height="62" rx="6" fill="#fff" stroke="rgba(15,110,86,0.2)" stroke-width="1"/>
  <text x="404" y="160" font-family="DM Sans,sans-serif" font-size="11" fill="#303030" font-weight="500">Verifiquei aqui e no momento</text>
  <text x="404" y="176" font-family="DM Sans,sans-serif" font-size="11" fill="#303030" font-weight="500">não há crédito disponível. 😕</text>
  <text x="404" y="194" font-family="DM Sans,sans-serif" font-size="11" fill="#303030">Assim que surgir, avisamos!</text>
  <text x="614" y="198" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- User satisfeito -->
  <rect x="526" y="214" width="156" height="26" rx="6" fill="#DCF8C6"/>
  <text x="604" y="231" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#14532D">Obrigado, entendido! 👍</text>
  <text x="672" y="235" font-family="DM Sans,sans-serif" font-size="8" fill="rgba(0,0,0,0.35)">11:14</text>

  <!-- Espaço vazio intencional mostrando menos mensagens -->
  <rect x="394" y="252" width="292" height="120" rx="8" fill="rgba(15,110,86,0.04)"/>
  <text x="540" y="306" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(15,110,86,0.4)" font-style="italic">Conversa encerrada.</text>
  <text x="540" y="324" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(15,110,86,0.4)" font-style="italic">Dúvida resolvida em 1 mensagem.</text>

  <!-- Métricas resultado -->
  <rect x="394" y="380" width="144" height="26" rx="6" fill="rgba(15,110,86,0.1)" stroke="rgba(15,110,86,0.2)" stroke-width="0.5"/>
  <text x="466" y="397" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0F6E56" font-weight="700">+10pp CSAT</text>
  <rect x="546" y="380" width="140" height="26" rx="6" fill="rgba(15,110,86,0.1)" stroke="rgba(15,110,86,0.2)" stroke-width="0.5"/>
  <text x="616" y="397" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#0F6E56" font-weight="700">+3pp Retenção</text>
</svg>
