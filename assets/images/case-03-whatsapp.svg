<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" width="900" height="540" role="img" aria-label="Comparação antes e depois do chatbot de crédito PJ no WhatsApp: antes com quatro mensagens genéricas sem responder a pergunta real, depois com resposta direta em duas mensagens objetivas">
  <title>Antes e depois — chatbot crédito PJ no WhatsApp</title>
  <desc>Dois celulares lado a lado mostrando a conversa no WhatsApp. À esquerda, o fluxo antigo: usuário pergunta se tem empréstimo disponível e recebe respostas longas e genéricas que não respondem. À direita, o fluxo redesenhado: resposta direta, personalizada, com valor e condições visíveis em duas mensagens.</desc>
  <defs>
    <linearGradient id="bg03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#0F1D30"/>
    </linearGradient>
    <linearGradient id="phoneFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2A"/>
      <stop offset="100%" stop-color="#111120"/>
    </linearGradient>
    <linearGradient id="waBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B141A"/>
      <stop offset="100%" stop-color="#0A1118"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="url(#bg03)"/>
  <pattern id="grid03" width="36" height="36" patternUnits="userSpaceOnUse">
    <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#162535" stroke-width="0.4" opacity="0.4"/>
  </pattern>
  <rect width="900" height="540" fill="url(#grid03)"/>
  <rect x="0" y="0" width="900" height="3" fill="#0F6E56"/>

  <!-- Header -->
  <rect x="0" y="3" width="900" height="70" fill="#080F18" opacity="0.7"/>
  <rect x="44" y="18" width="130" height="20" rx="10" fill="#8B3A3A" opacity="0.2"/>
  <rect x="44" y="18" width="130" height="20" rx="10" fill="none" stroke="#8B3A3A" stroke-width="0.8" opacity="0.5"/>
  <text x="109" y="32" font-family="'Courier New', monospace" font-size="9" fill="#C47070" text-anchor="middle" letter-spacing="1">ANTES · CASE 03</text>

  <rect x="530" y="18" width="130" height="20" rx="10" fill="#0F6E56" opacity="0.15"/>
  <rect x="530" y="18" width="130" height="20" rx="10" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <text x="595" y="32" font-family="'Courier New', monospace" font-size="9" fill="#4DB896" text-anchor="middle" letter-spacing="1">DEPOIS · CASE 03</text>

  <text x="250" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#E8F4F0" text-anchor="middle" letter-spacing="-0.3">A pergunta que o chatbot nunca respondeu</text>
  <text x="650" y="58" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#E8F4F0" text-anchor="middle" letter-spacing="-0.3">O redesign que respondeu de verdade</text>

  <!-- Divider -->
  <line x1="450" y1="0" x2="450" y2="540" stroke="#1E3A5A" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- ── LEFT PHONE - BEFORE ── -->
  <!-- Phone shell -->
  <rect x="110" y="88" width="280" height="430" rx="28" fill="url(#phoneFrame)"/>
  <rect x="116" y="94" width="268" height="418" rx="22" fill="url(#waBg)"/>

  <!-- Camera notch -->
  <rect x="222" y="97" width="56" height="8" rx="4" fill="#0A0A14"/>
  <circle cx="260" cy="101" r="3" fill="#1A1A2A"/>

  <!-- WhatsApp header -->
  <rect x="116" y="110" width="268" height="52" fill="#1F2C34"/>
  <circle cx="148" cy="136" r="14" fill="#2A5A4A"/>
  <text x="148" y="141" font-family="Georgia, serif" font-size="12" fill="#25D366" text-anchor="middle" font-weight="700">P</text>
  <text x="168" y="131" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Pagora Crédito</text>
  <circle cx="168" cy="144" r="4" fill="#25D366"/>
  <text x="177" y="148" font-family="Georgia, serif" font-size="9" fill="#8A9BA8">online</text>

  <!-- Chat background wallpaper -->
  <rect x="116" y="162" width="268" height="316" fill="#0B141A"/>
  <!-- Subtle wallpaper pattern -->
  <pattern id="waBg2" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="1" fill="#1A2830" opacity="0.5"/>
  </pattern>
  <rect x="116" y="162" width="268" height="316" fill="url(#waBg2)"/>

  <!-- User message -->
  <rect x="198" y="172" width="172" height="26" rx="6" fill="#005C4B"/>
  <text x="284" y="189" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF" text-anchor="middle">Tenho empréstimo disponível?</text>
  <text x="356" y="193" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- Bot response 1 - too long, generic -->
  <rect x="122" y="206" width="220" height="76" rx="6" fill="#1F2C34"/>
  <rect x="122" y="206" width="6" height="76" rx="3" fill="#8B3A3A" opacity="0.6"/>
  <text x="136" y="222" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">Sabemos que o crédito pode fazer</text>
  <text x="136" y="236" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">a diferença para o seu negócio.</text>
  <text x="136" y="250" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">Temos diversas soluções pensadas</text>
  <text x="136" y="264" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">especialmente para empreendedores.</text>
  <text x="332" y="277" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- Bot response 2 -->
  <rect x="122" y="290" width="200" height="54" rx="6" fill="#1F2C34"/>
  <rect x="122" y="290" width="6" height="54" rx="3" fill="#8B3A3A" opacity="0.6"/>
  <text x="136" y="306" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">Para verificar suas condições,</text>
  <text x="136" y="320" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">acesse o app Pagora ou fale</text>
  <text x="136" y="334" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF">com nossos especialistas.</text>
  <text x="317" y="339" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- User reaction: frustrated -->
  <rect x="196" y="352" width="182" height="26" rx="6" fill="#005C4B"/>
  <text x="287" y="369" font-family="Georgia, serif" font-size="10" fill="#E9EDEF" text-anchor="middle">Mas tenho ou não tenho?? 😤</text>
  <text x="356" y="373" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:15</text>

  <!-- CSAT tag -->
  <rect x="130" y="388" width="230" height="36" rx="6" fill="#2A0A0A"/>
  <rect x="130" y="388" width="4" height="36" rx="2" fill="#C47070"/>
  <text x="144" y="403" font-family="'Courier New', monospace" font-size="9" fill="#C47070">avaliação real de CSAT:</text>
  <text x="144" y="418" font-family="Georgia, serif" font-size="9.5" fill="#E9EDEF" font-style="italic">"Não entendi se tenho empréstimo."</text>

  <!-- Input bar -->
  <rect x="116" y="478" width="268" height="34" fill="#1F2C34"/>
  <rect x="126" y="484" width="210" height="22" rx="11" fill="#2A3942"/>
  <text x="148" y="498" font-family="Georgia, serif" font-size="10" fill="#8A9BA8">Mensagem</text>

  <!-- ── RIGHT PHONE - AFTER ── -->
  <!-- Phone shell -->
  <rect x="510" y="88" width="280" height="430" rx="28" fill="url(#phoneFrame)"/>
  <rect x="516" y="94" width="268" height="418" rx="22" fill="url(#waBg)"/>

  <!-- Camera notch -->
  <rect x="622" y="97" width="56" height="8" rx="4" fill="#0A0A14"/>
  <circle cx="660" cy="101" r="3" fill="#1A1A2A"/>

  <!-- WhatsApp header -->
  <rect x="516" y="110" width="268" height="52" fill="#1F2C34"/>
  <circle cx="548" cy="136" r="14" fill="#0F4D3A"/>
  <text x="548" y="141" font-family="Georgia, serif" font-size="12" fill="#25D366" text-anchor="middle" font-weight="700">P</text>
  <text x="568" y="131" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Pagora Crédito</text>
  <circle cx="568" cy="144" r="4" fill="#25D366"/>
  <text x="577" y="148" font-family="Georgia, serif" font-size="9" fill="#8A9BA8">online</text>

  <!-- Chat background -->
  <rect x="516" y="162" width="268" height="316" fill="#0B141A"/>
  <rect x="516" y="162" width="268" height="316" fill="url(#waBg2)"/>

  <!-- User message - same question -->
  <rect x="598" y="172" width="172" height="26" rx="6" fill="#005C4B"/>
  <text x="684" y="189" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF" text-anchor="middle">Tenho empréstimo disponível?</text>
  <text x="756" y="193" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- Bot response - direct, good -->
  <rect x="522" y="206" width="236" height="82" rx="6" fill="#1F2C34"/>
  <rect x="522" y="206" width="4" height="82" rx="3" fill="#0F6E56"/>
  <text x="536" y="224" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF" font-weight="500">Sim! Você tem R$ 25.000</text>
  <text x="536" y="240" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF">disponíveis agora. Taxa de</text>
  <text x="536" y="256" font-family="Georgia, serif" font-size="10.5" fill="#4DB896">1,49% ao mês</text>
  <text x="536" y="270" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF">· prazo em até 24x.</text>
  <text x="748" y="283" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- Bot CTA card -->
  <rect x="522" y="298" width="236" height="62" rx="6" fill="#0F2A1E"/>
  <rect x="522" y="298" width="236" height="62" rx="6" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.6"/>
  <text x="536" y="316" font-family="Georgia, serif" font-size="10.5" fill="#4DB896" font-weight="500">Quer simular agora?</text>
  <text x="536" y="332" font-family="Georgia, serif" font-size="9.5" fill="#9BB8C4">Digita o valor que precisa e eu</text>
  <text x="536" y="346" font-family="Georgia, serif" font-size="9.5" fill="#9BB8C4">calculo as parcelas na hora.</text>
  <text x="748" y="356" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:14</text>

  <!-- User positive response -->
  <rect x="614" y="370" width="140" height="26" rx="6" fill="#005C4B"/>
  <text x="684" y="387" font-family="Georgia, serif" font-size="10.5" fill="#E9EDEF" text-anchor="middle">Sim, quero simular!</text>
  <text x="748" y="391" font-family="Georgia, serif" font-size="8" fill="#8A9BA8" text-anchor="end">11:15</text>

  <!-- Result tag -->
  <rect x="530" y="406" width="222" height="58" rx="6" fill="#0A2018"/>
  <rect x="530" y="406" width="4" height="58" rx="2" fill="#0F6E56"/>
  <text x="544" y="423" font-family="'Courier New', monospace" font-size="9" fill="#4DB896">resultado do redesign:</text>
  <text x="544" y="440" font-family="Georgia, serif" font-size="10.5" fill="#E8F4F0">+10pp CSAT · +3pp retenção</text>
  <text x="544" y="457" font-family="Georgia, serif" font-size="9.5" fill="#9BB8C4">hierarquia da informação + clareza</text>

  <!-- Input bar right phone -->
  <rect x="516" y="478" width="268" height="34" fill="#1F2C34"/>
  <rect x="526" y="484" width="210" height="22" rx="11" fill="#2A3942"/>
  <text x="548" y="498" font-family="Georgia, serif" font-size="10" fill="#8A9BA8">Mensagem</text>

  <!-- Bottom signature -->
  <text x="856" y="532" font-family="Georgia, serif" font-size="10" fill="#1A3A2A" text-anchor="end" letter-spacing="0.5">samantha silva · portfólio</text>
</svg>
