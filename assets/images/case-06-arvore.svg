<svg viewBox="0 0 720 600" width="720" height="600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Árvore de decisão do assistente de seguros: a conversa se ramifica a partir da intenção do usuário em três caminhos — contratar, entender cobertura e acionar sinistro">
<title>Árvore de decisão — assistente de seguros Content First</title>
<desc>A conversa começa com a intenção do usuário. Contratar: coleta perfil, apresenta opções ordenadas por fit e fecha. Entender cobertura: identifica produto, explica em linguagem simples e oferece contratação. Acionar sinistro: coleta dados do evento e direciona para o processo com protocolo e prazo.</desc>
<defs><style>
text{font-family:Georgia,serif}
.nr{fill:#E6F1FB;stroke:#85B7EB;stroke-width:1.2}
.nt{fill:#EAF3DE;stroke:#97C459;stroke-width:1}
.np{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1}
.nc{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.2}
.nd{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:1}
.ns{fill:#FAECE7;stroke:#F0997B;stroke-width:1}
.tr{fill:#0C447C;font-size:12px}
.tt{fill:#27500A;font-size:11px}
.tp{fill:#3C3489;font-size:11px}
.tc{fill:#085041;font-size:11px}
.ts{fill:#888780;font-size:10px}
.td{fill:#444441;font-size:10px}
.tsi{fill:#712B13;font-size:11px}
.e{stroke:#B4B2A9;stroke-width:1;fill:none}
.et{stroke:#639922;stroke-width:1;fill:none}
.ep{stroke:#7F77DD;stroke-width:1;fill:none}
.ec{stroke:#1D9E75;stroke-width:1.2;fill:none}
</style></defs>
<rect width="720" height="600" fill="#FAFAF8" rx="12"/>
<text x="360" y="22" text-anchor="middle" font-size="10" letter-spacing="1.2" fill="#888780">JORNADA CONVERSACIONAL — CONTENT FIRST · SEGUROS</text>
<line x1="16" y1="28" x2="704" y2="28" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="240" y="40" width="240" height="44" rx="8" class="nr"/>
<text x="360" y="58" text-anchor="middle" class="tr" font-weight="500">Assistente pergunta:</text>
<text x="360" y="74" text-anchor="middle" class="tr">"Qual é a sua intenção hoje?"</text>
<path d="M360,84 L360,100" class="e"/>
<path d="M360,100 L120,100 M360,100 L600,100" class="e"/>
<path d="M120,100 L120,118" class="et"/>
<rect x="44" y="118" width="152" height="36" rx="7" class="nt"/>
<text x="120" y="134" text-anchor="middle" class="tt" font-weight="500">Quero contratar</text>
<text x="120" y="148" text-anchor="middle" class="ts">um seguro</text>
<path d="M120,154 L120,174" class="et"/>
<rect x="52" y="174" width="136" height="36" rx="6" class="nd"/>
<text x="120" y="190" text-anchor="middle" class="td">Qual tipo de seguro?</text>
<text x="120" y="204" text-anchor="middle" class="ts">auto · vida · residencial</text>
<path d="M120,210 L120,230" class="et"/>
<rect x="52" y="230" width="136" height="36" rx="6" class="nd"/>
<text x="120" y="246" text-anchor="middle" class="td">Qual seu orçamento?</text>
<text x="120" y="260" text-anchor="middle" class="ts">perfil de risco e cobertura</text>
<path d="M120,266 L120,286" class="et"/>
<rect x="44" y="286" width="152" height="44" rx="6" class="nt"/>
<text x="120" y="304" text-anchor="middle" class="tt">Apresenta 2–3 opções</text>
<text x="120" y="318" text-anchor="middle" class="ts">ordenadas por fit · não por preço</text>
<path d="M120,330 L120,350" class="et"/>
<rect x="52" y="350" width="136" height="36" rx="6" class="nc"/>
<text x="120" y="367" text-anchor="middle" class="tc" font-weight="500">Seguro contratado</text>
<text x="120" y="381" text-anchor="middle" class="ts">confirmação + próximos passos</text>
<path d="M360,100 L360,118" class="ep"/>
<rect x="278" y="118" width="164" height="36" rx="7" class="np"/>
<text x="360" y="134" text-anchor="middle" class="tp" font-weight="500">Quero entender</text>
<text x="360" y="148" text-anchor="middle" class="ts">minha cobertura</text>
<path d="M360,154 L360,174" class="ep"/>
<rect x="288" y="174" width="144" height="36" rx="6" class="nd"/>
<text x="360" y="190" text-anchor="middle" class="td">Qual seguro você tem?</text>
<text x="360" y="204" text-anchor="middle" class="ts">identifica o produto</text>
<path d="M360,210 L360,230" class="ep"/>
<rect x="278" y="230" width="164" height="52" rx="6" class="np"/>
<text x="360" y="248" text-anchor="middle" class="tp">Explica cobertura</text>
<text x="360" y="262" text-anchor="middle" class="ts">em linguagem simples</text>
<text x="360" y="274" text-anchor="middle" class="ts">sem jargão técnico</text>
<path d="M360,282 L360,302" class="ep"/>
<rect x="288" y="302" width="144" height="36" rx="6" class="nd"/>
<text x="360" y="318" text-anchor="middle" class="td">Tem alguma dúvida</text>
<text x="360" y="332" text-anchor="middle" class="ts">sobre o que cobre?</text>
<path d="M360,338 L360,354" class="ep"/>
<path d="M360,354 L310,354 M360,354 L410,354" class="ep"/>
<rect x="272" y="354" width="76" height="28" rx="6" class="nd"/>
<text x="310" y="371" text-anchor="middle" class="ts">Sim → esclarece</text>
<rect x="372" y="354" width="76" height="28" rx="6" class="nc"/>
<text x="410" y="371" text-anchor="middle" class="tc">Não → oferta</text>
<path d="M600,100 L600,118" class="e"/>
<rect x="524" y="118" width="152" height="36" rx="7" class="ns"/>
<text x="600" y="134" text-anchor="middle" class="tsi" font-weight="500">Quero acionar</text>
<text x="600" y="148" text-anchor="middle" class="ts">um sinistro</text>
<path d="M600,154 L600,174" class="e"/>
<rect x="532" y="174" width="136" height="36" rx="6" class="nd"/>
<text x="600" y="190" text-anchor="middle" class="td">O que aconteceu?</text>
<text x="600" y="204" text-anchor="middle" class="ts">coleta dados do evento</text>
<path d="M600,210 L600,230" class="e"/>
<rect x="532" y="230" width="136" height="36" rx="6" class="nd"/>
<text x="600" y="246" text-anchor="middle" class="td">Quando aconteceu?</text>
<text x="600" y="260" text-anchor="middle" class="ts">data · local · envolvidos</text>
<path d="M600,266 L600,286" class="e"/>
<rect x="524" y="286" width="152" height="44" rx="6" class="ns"/>
<text x="600" y="304" text-anchor="middle" class="tsi">Direciona para processo</text>
<text x="600" y="318" text-anchor="middle" class="ts">protocolo + prazo + contato</text>
<rect x="16" y="470" width="12" height="12" rx="2" class="nt"/>
<text x="34" y="481" class="ts">contratar seguro</text>
<rect x="16" y="490" width="12" height="12" rx="2" class="np"/>
<text x="34" y="501" class="ts">entender cobertura</text>
<rect x="16" y="510" width="12" height="12" rx="2" class="ns"/>
<text x="34" y="521" class="ts">acionar sinistro</text>
<rect x="16" y="530" width="12" height="12" rx="2" class="nc"/>
<text x="34" y="541" class="ts">desfecho positivo</text>
<text x="360" y="572" text-anchor="middle" class="ts">a intenção define o caminho · o conteúdo define as perguntas · a estrutura vem por último</text>
</svg>
