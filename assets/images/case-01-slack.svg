<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-label="Interface do Slack mostrando o Assistente de Voz da Marca da Avenue em ação: um designer solicita três versões de push notification adaptadas por segmento e o assistente retorna respostas calibradas para Iniciante, Crescimento e Singular">
  <title>Assistente de Voz da Marca — Slack, Avenue</title>
  <desc>Simulação do Slack com o VozBot respondendo a uma solicitação de copy de push notification para os três segmentos da Avenue: Digital (tom leve e didático), Advanced (tom direto e orientado a dados), e Singular (tom refinado e exclusivo).</desc>
  <defs>
    <linearGradient id="slackBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#19171D"/>
      <stop offset="100%" stop-color="#1A1823"/>
    </linearGradient>
    <linearGradient id="sidebarBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#350D36"/>
      <stop offset="100%" stop-color="#2D0B2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#slackBg)"/>
  <rect x="0" y="0" width="900" height="3" fill="#0F6E56"/>

  <!-- ── SIDEBAR ── -->
  <rect x="0" y="0" width="220" height="500" fill="url(#sidebarBg)"/>

  <!-- Workspace name -->
  <text x="20" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#FFFFFF" font-weight="500">Avenue Securities</text>
  <circle cx="200" cy="30" r="8" fill="#0F6E56"/>
  <text x="200" y="34.5" font-family="Georgia, serif" font-size="10" fill="#FFFFFF" text-anchor="middle">+</text>

  <!-- User status -->
  <rect x="0" y="48" width="220" height="1" fill="rgba(255,255,255,0.1)"/>
  <circle cx="18" cy="68" r="12" fill="#2A1A2E"/>
  <text x="18" y="72.5" font-family="Georgia, serif" font-size="10" fill="#C9A0DC" text-anchor="middle">Sa</text>
  <circle cx="26" cy="76" r="4" fill="#25D366"/>
  <text x="40" y="68" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">Samantha</text>
  <text x="40" y="82" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.45)">Content Design</text>

  <!-- Channels list -->
  <rect x="0" y="95" width="220" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="16" y="116" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">CANAIS</text>

  <text x="16" y="140" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># conteudo-geral</text>
  <text x="16" y="160" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># design-conversacional</text>
  <text x="16" y="180" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># campanhas</text>
  <!-- Active channel -->
  <rect x="8" y="193" width="204" height="26" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="16" y="210" font-family="Georgia, serif" font-size="12" fill="#FFFFFF"># voz-da-marca</text>

  <text x="16" y="240" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># aprovacoes</text>

  <!-- Apps section -->
  <rect x="0" y="258" width="220" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="16" y="278" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">APPS</text>
  <!-- VozBot highlighted -->
  <rect x="8" y="285" width="204" height="30" rx="6" fill="#0F6E56" opacity="0.2"/>
  <rect x="8" y="285" width="204" height="30" rx="6" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <circle cx="28" cy="300" r="10" fill="#0F6E56"/>
  <text x="28" y="304.5" font-family="Georgia, serif" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="700">V</text>
  <text x="44" y="298" font-family="Georgia, serif" font-size="12" fill="#4DB896">VozBot</text>
  <circle cx="200" cy="300" r="8" fill="#0F6E56"/>
  <text x="200" y="304.5" font-family="'Courier New', monospace" font-size="8" fill="#FFFFFF" text-anchor="middle">ON</text>

  <!-- ── MAIN CHAT AREA ── -->
  <rect x="220" y="0" width="680" height="500" fill="#1A1D27"/>

  <!-- Channel header -->
  <rect x="220" y="0" width="680" height="52" fill="#1E2130"/>
  <rect x="220" y="52" width="680" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="240" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#FFFFFF" font-weight="500"># voz-da-marca</text>
  <text x="240" y="42" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.4)">Assistente de Voz calibrado por segmento · Avenue Securities</text>

  <!-- Timestamp -->
  <text x="560" y="80" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle">hoje · 09h44</text>

  <!-- ── USER MESSAGE ── -->
  <circle cx="248" cy="105" r="16" fill="#3A1A3C"/>
  <text x="248" y="110" font-family="Georgia, serif" font-size="12" fill="#C9A0DC" text-anchor="middle" font-weight="600">Sa</text>
  <text x="272" y="100" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Samantha</text>
  <text x="340" y="100" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">09:44</text>
  <text x="272" y="118" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">@VozBot preciso de 3 versões de push de aportes para os segmentos.</text>
  <text x="272" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Campanha de fim de mês. Adapte o tom por segmento.</text>

  <!-- ── VOZBOT RESPONSE ── -->
  <!-- Divider -->
  <rect x="230" y="152" width="650" height="1" fill="rgba(255,255,255,0.05)"/>

  <!-- VozBot avatar -->
  <circle cx="248" cy="180" r="16" fill="#0F6E56"/>
  <text x="248" y="185" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" text-anchor="middle" font-weight="700">V</text>
  <circle cx="260" cy="192" r="5" fill="#25D366"/>

  <text x="272" y="175" font-family="Georgia, serif" font-size="12" fill="#4DB896" font-weight="500">VozBot</text>
  <rect x="338" y="165" width="46" height="16" rx="8" fill="#0F6E56" opacity="0.3"/>
  <text x="361" y="176" font-family="'Courier New', monospace" font-size="8.5" fill="#4DB896" text-anchor="middle">APP</text>
  <text x="392" y="175" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">09:44</text>

  <text x="272" y="194" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="rgba(255,255,255,0.7)">Aqui estão as 3 versões calibradas por segmento e momento de jornada:</text>

  <!-- Segment cards -->
  <!-- Card 1: Digital -->
  <rect x="272" y="208" width="196" height="86" rx="8" fill="#1E2840"/>
  <rect x="272" y="208" width="4" height="86" rx="2" fill="#4A9EE8"/>
  <text x="284" y="225" font-family="'Courier New', monospace" font-size="9" fill="#4A9EE8" letter-spacing="0.8">DIGITAL · tom leve</text>
  <text x="284" y="243" font-family="Georgia, serif" font-size="11.5" fill="#E8F0F8">Que tal fazer seu dinheiro</text>
  <text x="284" y="259" font-family="Georgia, serif" font-size="11.5" fill="#E8F0F8">trabalhar por você este mês?</text>
  <text x="284" y="278" font-family="Georgia, serif" font-size="10.5" fill="rgba(255,255,255,0.4)">Configure aportes agora.</text>

  <!-- Card 2: Advanced (highlighted) -->
  <rect x="476" y="208" width="196" height="86" rx="8" fill="#1A2A1E"/>
  <rect x="476" y="208" width="4" height="86" rx="2" fill="#0F6E56"/>
  <rect x="476" y="208" width="196" height="86" rx="8" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <text x="488" y="225" font-family="'Courier New', monospace" font-size="9" fill="#4DB896" letter-spacing="0.8">ADVANCED · tom direto</text>
  <text x="488" y="243" font-family="Georgia, serif" font-size="11.5" fill="#E8F4F0">Aporte programado reduz</text>
  <text x="488" y="259" font-family="Georgia, serif" font-size="11.5" fill="#E8F4F0">custo médio e aumenta retorno.</text>
  <text x="488" y="278" font-family="Georgia, serif" font-size="10.5" fill="rgba(255,255,255,0.4)">Configure agora.</text>

  <!-- Card 3: Singular -->
  <rect x="680" y="208" width="196" height="86" rx="8" fill="#22201A"/>
  <rect x="680" y="208" width="4" height="86" rx="2" fill="#C8A96A"/>
  <text x="692" y="225" font-family="'Courier New', monospace" font-size="9" fill="#C8A96A" letter-spacing="0.8">SINGULAR · tom refinado</text>
  <text x="692" y="243" font-family="Georgia, serif" font-size="11.5" fill="#EDE8D8">Patrimônio que cresce</text>
  <text x="692" y="259" font-family="Georgia, serif" font-size="11.5" fill="#EDE8D8">com consistência. Programe</text>
  <text x="692" y="278" font-family="Georgia, serif" font-size="10.5" fill="rgba(237,232,216,0.5)">seu próximo aporte.</text>

  <!-- VozBot footnote -->
  <text x="272" y="314" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.4)">Calibrado para: momento de jornada (fim de mês), canal (push), segmento (registro, tom, vocabulário).</text>

  <!-- Reactions -->
  <rect x="272" y="326" width="50" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <rect x="272" y="326" width="50" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="297" y="341" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">🙌 3</text>

  <rect x="328" y="326" width="44" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <rect x="328" y="326" width="44" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="350" y="341" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">✅ 2</text>

  <rect x="378" y="326" width="44" height="22" rx="11" fill="rgba(255,255,255,0.06)"/>
  <rect x="378" y="326" width="44" height="22" rx="11" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="400" y="341" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">🔥 1</text>

  <!-- Second user reply -->
  <rect x="230" y="360" width="650" height="1" fill="rgba(255,255,255,0.04)"/>
  <circle cx="248" cy="388" r="16" fill="#3A1A3C"/>
  <text x="248" y="393" font-family="Georgia, serif" font-size="12" fill="#C9A0DC" text-anchor="middle" font-weight="600">Sa</text>
  <text x="272" y="384" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Samantha</text>
  <text x="340" y="384" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">09:46</text>
  <text x="272" y="402" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Perfeito. Vou usar a versão Advanced na campanha de hoje.</text>

  <!-- Input bar -->
  <rect x="220" y="452" width="680" height="48" fill="#1E2130"/>
  <rect x="236" y="462" width="540" height="28" rx="6" fill="#2A2E3D"/>
  <rect x="236" y="462" width="540" height="28" rx="6" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.8"/>
  <text x="252" y="479" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.25)">Mensagem para #voz-da-marca</text>

  <!-- Signature -->
  <text x="856" y="495" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.12)" text-anchor="end" letter-spacing="0.5">samantha silva · portfólio</text>
</svg>
