<svg viewBox="0 0 720 600" width="720" height="600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Decision tree for the insurance assistant: the conversation branches from user intention into three paths — get insurance, understand coverage, and file a claim">
<title>Decision tree — Content First insurance assistant</title>
<desc>The conversation starts with user intention. Get insurance: collects profile, presents options ranked by fit and closes. Understand coverage: identifies product, explains in plain language and offers contracting. File a claim: collects event data and directs to process with protocol and deadline.</desc>
<defs><style>
text{font-family:Georgia,serif}
.nr{fill:#E6F1FB;stroke:#85B7EB;stroke-width:1.2}
.nt{fill:#EAF3DE;stroke:#97C459;stroke-width:1}
.np{fill:#EEEDFE;stroke:#AFA9EC;stroke-width:1}
.nc{fill:#E1F5EE;stroke:#5DCAA5;stroke-width:1.2}
.nd{fill:#F1EFE8;stroke:#B4B2A9;stroke-width:1}
.ns{fill:#FAECE7;stroke:#F0997B;stroke-width:1}
.tr{fill:#0C447C;font-size:12px}
.tt{fill:#27500A;font-size:11px}
.tp{fill:#3C3489;font-size:11px}
.tc{fill:#085041;font-size:11px}
.ts{fill:#888780;font-size:10px}
.td{fill:#444441;font-size:10px}
.tsi{fill:#712B13;font-size:11px}
.e{stroke:#B4B2A9;stroke-width:1;fill:none}
.et{stroke:#639922;stroke-width:1;fill:none}
.ep{stroke:#7F77DD;stroke-width:1;fill:none}
.ec{stroke:#1D9E75;stroke-width:1.2;fill:none}
</style></defs>
<rect width="720" height="600" fill="#FAFAF8" rx="12"/>
<text x="360" y="22" text-anchor="middle" font-size="10" letter-spacing="1.2" fill="#888780">CONVERSATIONAL JOURNEY — CONTENT FIRST · INSURANCE</text>
<line x1="16" y1="28" x2="704" y2="28" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="240" y="40" width="240" height="44" rx="8" class="nr"/>
<text x="360" y="58" text-anchor="middle" class="tr" font-weight="500">Assistant asks:</text>
<text x="360" y="74" text-anchor="middle" class="tr">"What is your intention today?"</text>
<path d="M360,84 L360,100" class="e"/>
<path d="M360,100 L120,100 M360,100 L600,100" class="e"/>
<path d="M120,100 L120,118" class="et"/>
<rect x="44" y="118" width="152" height="36" rx="7" class="nt"/>
<text x="120" y="134" text-anchor="middle" class="tt" font-weight="500">I want to get</text>
<text x="120" y="148" text-anchor="middle" class="ts">insurance</text>
<path d="M120,154 L120,174" class="et"/>
<rect x="52" y="174" width="136" height="36" rx="6" class="nd"/>
<text x="120" y="190" text-anchor="middle" class="td">What type of insurance?</text>
<text x="120" y="204" text-anchor="middle" class="ts">auto · life · home</text>
<path d="M120,210 L120,230" class="et"/>
<rect x="52" y="230" width="136" height="36" rx="6" class="nd"/>
<text x="120" y="246" text-anchor="middle" class="td">What's your budget?</text>
<text x="120" y="260" text-anchor="middle" class="ts">risk profile and coverage</text>
<path d="M120,266 L120,286" class="et"/>
<rect x="44" y="286" width="152" height="44" rx="6" class="nt"/>
<text x="120" y="304" text-anchor="middle" class="tt">Shows 2–3 options</text>
<text x="120" y="318" text-anchor="middle" class="ts">ranked by fit · not by price</text>
<path d="M120,330 L120,350" class="et"/>
<rect x="52" y="350" width="136" height="36" rx="6" class="nc"/>
<text x="120" y="367" text-anchor="middle" class="tc" font-weight="500">Insurance contracted</text>
<text x="120" y="381" text-anchor="middle" class="ts">confirmation + next steps</text>
<path d="M360,100 L360,118" class="ep"/>
<rect x="278" y="118" width="164" height="36" rx="7" class="np"/>
<text x="360" y="134" text-anchor="middle" class="tp" font-weight="500">I want to understand</text>
<text x="360" y="148" text-anchor="middle" class="ts">my coverage</text>
<path d="M360,154 L360,174" class="ep"/>
<rect x="288" y="174" width="144" height="36" rx="6" class="nd"/>
<text x="360" y="190" text-anchor="middle" class="td">Which insurance do you have?</text>
<text x="360" y="204" text-anchor="middle" class="ts">identifies the product</text>
<path d="M360,210 L360,230" class="ep"/>
<rect x="278" y="230" width="164" height="52" rx="6" class="np"/>
<text x="360" y="248" text-anchor="middle" class="tp">Explains coverage</text>
<text x="360" y="262" text-anchor="middle" class="ts">in plain language</text>
<text x="360" y="274" text-anchor="middle" class="ts">no technical jargon</text>
<path d="M360,282 L360,302" class="ep"/>
<rect x="288" y="302" width="144" height="36" rx="6" class="nd"/>
<text x="360" y="318" text-anchor="middle" class="td">Any questions</text>
<text x="360" y="332" text-anchor="middle" class="ts">about the coverage?</text>
<path d="M360,338 L360,354" class="ep"/>
<path d="M360,354 L310,354 M360,354 L410,354" class="ep"/>
<rect x="272" y="354" width="76" height="28" rx="6" class="nd"/>
<text x="310" y="371" text-anchor="middle" class="ts">Yes → clarifies</text>
<rect x="372" y="354" width="76" height="28" rx="6" class="nc"/>
<text x="410" y="371" text-anchor="middle" class="tc">No → offer</text>
<path d="M600,100 L600,118" class="e"/>
<rect x="524" y="118" width="152" height="36" rx="7" class="ns"/>
<text x="600" y="134" text-anchor="middle" class="tsi" font-weight="500">I want to file</text>
<text x="600" y="148" text-anchor="middle" class="ts">a claim</text>
<path d="M600,154 L600,174" class="e"/>
<rect x="532" y="174" width="136" height="36" rx="6" class="nd"/>
<text x="600" y="190" text-anchor="middle" class="td">What happened?</text>
<text x="600" y="204" text-anchor="middle" class="ts">collects event data</text>
<path d="M600,210 L600,230" class="e"/>
<rect x="532" y="230" width="136" height="36" rx="6" class="nd"/>
<text x="600" y="246" text-anchor="middle" class="td">When did it happen?</text>
<text x="600" y="260" text-anchor="middle" class="ts">date · location · parties</text>
<path d="M600,266 L600,286" class="e"/>
<rect x="524" y="286" width="152" height="44" rx="6" class="ns"/>
<text x="600" y="304" text-anchor="middle" class="tsi">Directs to process</text>
<text x="600" y="318" text-anchor="middle" class="ts">protocol + deadline + contact</text>
<rect x="16" y="470" width="12" height="12" rx="2" class="nt"/>
<text x="34" y="481" class="ts">get insurance</text>
<rect x="16" y="490" width="12" height="12" rx="2" class="np"/>
<text x="34" y="501" class="ts">understand coverage</text>
<rect x="16" y="510" width="12" height="12" rx="2" class="ns"/>
<text x="34" y="521" class="ts">file a claim</text>
<rect x="16" y="530" width="12" height="12" rx="2" class="nc"/>
<text x="34" y="541" class="ts">positive outcome</text>
<text x="360" y="572" text-anchor="middle" class="ts">intention defines the path · content defines the questions · structure comes last</text>
</svg>
