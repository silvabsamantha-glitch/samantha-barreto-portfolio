<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-label="Interface do Slack mostrando o Bot de Content First da Avenue em ação: um PM solicita ajuda para comunicar uma mudança de produto e o bot guia pelo processo de definir intenção antes de escolher o canal">
  <title>Bot de Content First — Slack, Avenue</title>
  <desc>Simulação do Slack com o ContentFirst Bot. Uma PM pede ajuda para comunicar uma mudança no onboarding. O bot não pergunta o canal — pergunta a intenção, o resultado esperado e o momento da jornada do usuário. Só depois sugere o canal e o formato ideal.</desc>
  <defs>
    <linearGradient id="slackBg02" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#19171D"/>
      <stop offset="100%" stop-color="#1A1823"/>
    </linearGradient>
    <linearGradient id="sidebarBg02" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#350D36"/>
      <stop offset="100%" stop-color="#2D0B2E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#slackBg02)"/>
  <rect x="0" y="0" width="900" height="3" fill="#0F6E56"/>

  <!-- ── SIDEBAR ── -->
  <rect x="0" y="0" width="220" height="500" fill="url(#sidebarBg02)"/>

  <!-- Workspace -->
  <text x="20" y="36" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#FFFFFF" font-weight="500">Avenue Securities</text>

  <rect x="0" y="48" width="220" height="1" fill="rgba(255,255,255,0.1)"/>

  <!-- User -->
  <circle cx="18" cy="68" r="12" fill="#2A1A2E"/>
  <text x="18" y="72.5" font-family="Georgia, serif" font-size="9" fill="#C9A0DC" text-anchor="middle">PM</text>
  <circle cx="26" cy="76" r="4" fill="#25D366"/>
  <text x="40" y="68" font-family="Georgia, serif" font-size="12" fill="#FFFFFF">Ana (PM)</text>
  <text x="40" y="82" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.4)">Product Manager</text>

  <rect x="0" y="95" width="220" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="16" y="116" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">CANAIS</text>

  <text x="16" y="140" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># produto</text>
  <text x="16" y="160" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># releases</text>
  <!-- Active -->
  <rect x="8" y="170" width="204" height="26" rx="6" fill="rgba(255,255,255,0.1)"/>
  <text x="16" y="187" font-family="Georgia, serif" font-size="12" fill="#FFFFFF"># content-first-bot</text>
  <text x="16" y="215" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.5)"># comunicados</text>

  <rect x="0" y="232" width="220" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="16" y="252" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="0.8">APPS</text>

  <!-- ContentFirst Bot -->
  <rect x="8" y="260" width="204" height="30" rx="6" fill="#0F6E56" opacity="0.2"/>
  <rect x="8" y="260" width="204" height="30" rx="6" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <circle cx="28" cy="275" r="10" fill="#0F4D3A"/>
  <text x="28" y="279.5" font-family="Georgia, serif" font-size="9" fill="#4DB896" text-anchor="middle" font-weight="700">CF</text>
  <text x="44" y="273" font-family="Georgia, serif" font-size="11" fill="#4DB896">ContentFirst Bot</text>
  <text x="44" y="286" font-family="'Courier New', monospace" font-size="8" fill="rgba(255,255,255,0.3)">intenção antes de canal</text>

  <!-- ── MAIN CHAT ── -->
  <rect x="220" y="0" width="680" height="500" fill="#1A1D27"/>

  <!-- Channel header -->
  <rect x="220" y="0" width="680" height="52" fill="#1E2130"/>
  <rect x="220" y="52" width="680" height="1" fill="rgba(255,255,255,0.08)"/>
  <text x="240" y="24" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#FFFFFF" font-weight="500"># content-first-bot</text>
  <text x="240" y="42" font-family="Georgia, serif" font-size="11" fill="rgba(255,255,255,0.4)">Intenção antes de canal · iniciativa própria · Avenue Securities</text>

  <!-- Timestamp -->
  <text x="560" y="78" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.2)" text-anchor="middle">hoje · 14h18</text>

  <!-- ── PM MESSAGE ── -->
  <circle cx="248" cy="104" r="16" fill="#1A2A4E"/>
  <text x="248" y="109" font-family="Georgia, serif" font-size="10" fill="#7EB3E8" text-anchor="middle" font-weight="600">PM</text>
  <text x="272" y="99" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Ana</text>
  <text x="304" y="99" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">14:18</text>
  <text x="272" y="117" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Preciso comunicar uma mudança no onboarding. Qual canal uso?</text>

  <!-- ── CONTENTFIRST BOT RESPONSE ── -->
  <rect x="230" y="135" width="650" height="1" fill="rgba(255,255,255,0.05)"/>

  <circle cx="248" cy="162" r="16" fill="#0F4D3A"/>
  <text x="248" y="167" font-family="Georgia, serif" font-size="10" fill="#4DB896" text-anchor="middle" font-weight="700">CF</text>
  <circle cx="260" cy="174" r="5" fill="#25D366"/>

  <text x="272" y="158" font-family="Georgia, serif" font-size="12" fill="#4DB896" font-weight="500">ContentFirst Bot</text>
  <rect x="366" y="148" width="46" height="16" rx="8" fill="#0F6E56" opacity="0.3"/>
  <text x="389" y="159" font-family="'Courier New', monospace" font-size="8.5" fill="#4DB896" text-anchor="middle">APP</text>
  <text x="420" y="158" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">14:18</text>

  <!-- Bot question: before channel, define intention -->
  <text x="272" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Antes de escolher o canal, vamos entender a intenção.</text>
  <text x="272" y="193" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Me responde três perguntas rápidas:</text>

  <!-- 3 questions card -->
  <rect x="272" y="204" width="580" height="90" rx="8" fill="#111B28"/>
  <rect x="272" y="204" width="4" height="90" rx="2" fill="#0F6E56"/>

  <!-- Q1 -->
  <text x="286" y="222" font-family="'Courier New', monospace" font-size="9.5" fill="#4DB896">01 —</text>
  <text x="322" y="222" font-family="Georgia, serif" font-size="12" fill="#E8F4F0">O que você quer que o usuário</text>
  <text x="322" y="237" font-family="Georgia, serif" font-size="12" fill="#4DB896">faça</text>
  <text x="342" y="237" font-family="Georgia, serif" font-size="12" fill="#E8F4F0">depois de ler?</text>

  <!-- Q2 -->
  <text x="286" y="256" font-family="'Courier New', monospace" font-size="9.5" fill="#4DB896">02 —</text>
  <text x="322" y="256" font-family="Georgia, serif" font-size="12" fill="#E8F4F0">Em qual</text>
  <text x="368" y="256" font-family="Georgia, serif" font-size="12" fill="#4DB896">momento da jornada</text>
  <text x="522" y="256" font-family="Georgia, serif" font-size="12" fill="#E8F4F0">ele está?</text>

  <!-- Q3 -->
  <text x="286" y="284" font-family="'Courier New', monospace" font-size="9.5" fill="#4DB896">03 —</text>
  <text x="322" y="284" font-family="Georgia, serif" font-size="12" fill="#E8F4F0">A mudança é urgente ou</text>
  <text x="322" y="284" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0)">A </text>
  <text x="482" y="284" font-family="Georgia, serif" font-size="12" fill="#4DB896">informativa?</text>

  <!-- PM answers -->
  <rect x="230" y="306" width="650" height="1" fill="rgba(255,255,255,0.04)"/>
  <circle cx="248" cy="330" r="16" fill="#1A2A4E"/>
  <text x="248" y="335" font-family="Georgia, serif" font-size="10" fill="#7EB3E8" text-anchor="middle" font-weight="600">PM</text>
  <text x="272" y="326" font-family="Georgia, serif" font-size="12" fill="#FFFFFF" font-weight="500">Ana</text>
  <text x="304" y="326" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">14:19</text>
  <text x="272" y="343" font-family="Georgia, 'Times New Roman', serif" font-size="12.5" fill="rgba(255,255,255,0.8)">Quero que ele complete o onboarding. Está no dia 2. É informativa, não urgente.</text>

  <!-- Bot recommendation -->
  <rect x="230" y="362" width="650" height="1" fill="rgba(255,255,255,0.04)"/>
  <circle cx="248" cy="386" r="16" fill="#0F4D3A"/>
  <text x="248" y="391" font-family="Georgia, serif" font-size="10" fill="#4DB896" text-anchor="middle" font-weight="700">CF</text>

  <text x="272" y="382" font-family="Georgia, serif" font-size="12" fill="#4DB896" font-weight="500">ContentFirst Bot</text>
  <text x="366" y="382" font-family="'Courier New', monospace" font-size="9" fill="rgba(255,255,255,0.25)">14:19</text>

  <!-- Recommendation box -->
  <rect x="272" y="394" width="580" height="62" rx="8" fill="#0A2018"/>
  <rect x="272" y="394" width="4" height="62" rx="2" fill="#0F6E56"/>
  <text x="286" y="412" font-family="'Courier New', monospace" font-size="9" fill="#4DB896" letter-spacing="0.5">recomendação:</text>
  <text x="286" y="430" font-family="Georgia, serif" font-size="12.5" fill="#E8F4F0">Canal: e-mail contextual (D+2) · tom: motivacional, sem urgência</text>
  <text x="286" y="448" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.55)">Assunto: "Você está quase lá — 2 minutos para finalizar seu cadastro"</text>

  <!-- Input bar -->
  <rect x="220" y="452" width="680" height="48" fill="#1E2130"/>
  <rect x="236" y="462" width="540" height="28" rx="6" fill="#2A2E3D"/>
  <text x="252" y="479" font-family="Georgia, serif" font-size="12" fill="rgba(255,255,255,0.25)">Mensagem para #content-first-bot</text>

  <!-- Signature -->
  <text x="856" y="495" font-family="Georgia, serif" font-size="10" fill="rgba(255,255,255,0.12)" text-anchor="end" letter-spacing="0.5">samantha silva · portfólio</text>
</svg>
