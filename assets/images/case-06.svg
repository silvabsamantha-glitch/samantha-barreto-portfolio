<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520" role="img" aria-label="Diagrama do processo Content First aplicado ao assistente de seguros: cinco etapas em sequência, da intenção do usuário até o fluxo final">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2F44"/>
      <stop offset="100%" stop-color="#152438"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F6E56"/>
      <stop offset="100%" stop-color="#0A5441"/>
    </linearGradient>
    <linearGradient id="highlightGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F6E56" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0F6E56" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow06" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M1,1 L7,4 L1,7 Z" fill="#0F6E56" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg06)"/>
  
  <!-- Subtle grid texture -->
  <pattern id="grid06" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E3A5A" stroke-width="0.4" opacity="0.4"/>
  </pattern>
  <rect width="900" height="520" fill="url(#grid06)"/>

  <!-- Green accent line top -->
  <rect x="0" y="0" width="900" height="3" fill="url(#greenGrad)"/>

  <!-- Header area -->
  <rect x="0" y="3" width="900" height="80" fill="#0D1B2A" opacity="0.6"/>
  
  <!-- Pill label -->
  <rect x="44" y="24" width="160" height="22" rx="11" fill="#0F6E56" opacity="0.18"/>
  <rect x="44" y="24" width="160" height="22" rx="11" fill="none" stroke="#0F6E56" stroke-width="0.8" opacity="0.5"/>
  <text x="124" y="39.5" font-family="'Courier New', monospace" font-size="9.5" fill="#4DB896" text-anchor="middle" letter-spacing="1.5" font-weight="600">CONTENT FIRST · CASE 06</text>

  <!-- Main title -->
  <text x="44" y="75" font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">Seguros: o assistente que começou pela intenção</text>

  <!-- Horizontal connector line under steps -->
  <line x1="104" y1="230" x2="796" y2="230" stroke="#0F6E56" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- ── STEP CARDS ── -->
  <!-- Step 1: Intenção -->
  <g filter="url(#softShadow)">
    <rect x="44" y="110" width="138" height="200" rx="10" fill="url(#cardGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="44" y="110" width="138" height="4" rx="2" fill="#0F6E56"/>
  </g>
  <circle cx="104" cy="230" r="16" fill="#0D1B2A" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="104" y="234.5" font-family="Georgia, serif" font-size="13" fill="#4DB896" text-anchor="middle" font-weight="700">01</text>
  <text x="113" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#9BB8C4" letter-spacing="0.5" font-weight="400">Intenção</text>
  <text x="59" y="163" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">O que o</text>
  <text x="59" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">usuário quer</text>
  <text x="59" y="199" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#4DB896" font-weight="400" letter-spacing="-0.3">fazer?</text>
  <!-- micro text -->
  <text x="59" y="263" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">"Quero contratar</text>
  <text x="59" y="275" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3"> seguro auto"</text>
  <text x="59" y="291" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">"Tive um sinistro"</text>
  <text x="59" y="303" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">"Quero cancelar"</text>

  <!-- Arrow 1→2 -->
  <line x1="192" y1="210" x2="218" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow06)" opacity="0.6"/>

  <!-- Step 2: Resultado Esperado -->
  <g filter="url(#softShadow)">
    <rect x="228" y="110" width="138" height="200" rx="10" fill="url(#cardGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="228" y="110" width="138" height="4" rx="2" fill="#0F6E56"/>
  </g>
  <circle cx="297" cy="230" r="16" fill="#0D1B2A" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="297" y="234.5" font-family="Georgia, serif" font-size="13" fill="#4DB896" text-anchor="middle" font-weight="700">02</text>
  <text x="243" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#9BB8C4" letter-spacing="0.5">Resultado</text>
  <text x="243" y="163" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">O que ele</text>
  <text x="243" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">precisa sentir</text>
  <text x="243" y="199" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#4DB896" font-weight="400" letter-spacing="-0.3">ao sair?</text>
  <text x="243" y="263" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">Confiança</text>
  <text x="243" y="275" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">Clareza</text>
  <text x="243" y="287" font-family="'Courier New', monospace" font-size="8.5" fill="#5A8A7A" letter-spacing="0.3">Controle</text>

  <!-- Arrow 2→3 -->
  <line x1="376" y1="210" x2="402" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow06)" opacity="0.6"/>

  <!-- Step 3: Encenação (highlight - center stage) -->
  <g filter="url(#softShadow)">
    <rect x="412" y="96" width="148" height="218" rx="10" fill="#122B20" stroke="#0F6E56" stroke-width="1.5"/>
    <rect x="412" y="96" width="148" height="5" rx="2" fill="#0F6E56"/>
  </g>
  <rect x="412" y="96" width="148" height="218" rx="10" fill="url(#highlightGrad)" opacity="0.5"/>
  <circle cx="486" cy="230" r="18" fill="#0F6E56"/>
  <text x="486" y="234.5" font-family="Georgia, serif" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="700">03</text>
  <!-- Star indicator -->
  <text x="548" y="114" font-family="Arial" font-size="10" fill="#4DB896" opacity="0.7">★</text>
  <text x="427" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4DB896" letter-spacing="0.5">Encenação</text>
  <text x="427" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">A conversa</text>
  <text x="427" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">acontece</text>
  <text x="427" y="184" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#4DB896" font-weight="400" letter-spacing="-0.3">antes da tela</text>
  <!-- Chat bubbles mini -->
  <rect x="427" y="258" width="80" height="18" rx="9" fill="#0F6E56" opacity="0.3"/>
  <text x="467" y="270.5" font-family="'Courier New', monospace" font-size="7.5" fill="#4DB896" text-anchor="middle">usuário: "tenho filhos"</text>
  <rect x="443" y="281" width="80" height="18" rx="9" fill="#1A3A2E" opacity="0.5"/>
  <text x="483" y="293.5" font-family="'Courier New', monospace" font-size="7.5" fill="#9BB8C4" text-anchor="middle">bot: "inclui dependentes?"</text>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="210" x2="596" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow06)" opacity="0.6"/>

  <!-- Step 4: Jornada -->
  <g filter="url(#softShadow)">
    <rect x="606" y="110" width="138" height="200" rx="10" fill="url(#cardGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="606" y="110" width="138" height="4" rx="2" fill="#0F6E56"/>
  </g>
  <circle cx="675" cy="230" r="16" fill="#0D1B2A" stroke="#0F6E56" stroke-width="1.5"/>
  <text x="675" y="234.5" font-family="Georgia, serif" font-size="13" fill="#4DB896" text-anchor="middle" font-weight="700">04</text>
  <text x="621" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#9BB8C4" letter-spacing="0.5">Jornada</text>
  <text x="621" y="163" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">Quais são os</text>
  <text x="621" y="181" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">momentos</text>
  <text x="621" y="199" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#4DB896" font-weight="400" letter-spacing="-0.3">da conversa?</text>
  <!-- mini journey dots -->
  <circle cx="631" cy="263" r="4" fill="#0F6E56" opacity="0.7"/>
  <line x1="635" y1="263" x2="655" y2="263" stroke="#0F6E56" stroke-width="1" opacity="0.4"/>
  <circle cx="659" cy="263" r="4" fill="#0F6E56" opacity="0.5"/>
  <line x1="663" y1="263" x2="683" y2="263" stroke="#0F6E56" stroke-width="1" opacity="0.4"/>
  <circle cx="687" cy="263" r="4" fill="#0F6E56" opacity="0.35"/>
  <line x1="691" y1="263" x2="711" y2="263" stroke="#0F6E56" stroke-width="1" opacity="0.4"/>
  <circle cx="715" cy="263" r="4" fill="#4DB896" opacity="0.9"/>

  <!-- Arrow 4→5 -->
  <line x1="754" y1="210" x2="780" y2="210" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow06)" opacity="0.6"/>

  <!-- Step 5: Fluxo -->
  <g filter="url(#softShadow)">
    <rect x="790" y="110" width="70" height="200" rx="10" fill="url(#cardGrad)" stroke="#1E3A5A" stroke-width="1"/>
    <rect x="790" y="110" width="70" height="4" rx="2" fill="#4DB896" opacity="0.5"/>
  </g>
  <circle cx="825" cy="230" r="16" fill="#0D1B2A" stroke="#4DB896" stroke-width="1" opacity="0.7"/>
  <text x="825" y="234.5" font-family="Georgia, serif" font-size="13" fill="#4DB896" text-anchor="middle" font-weight="700">05</text>
  <text x="800" y="135" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#9BB8C4" letter-spacing="0.5">Fluxo</text>
  <text x="800" y="160" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">Agora</text>
  <text x="800" y="176" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#E8F4F0" font-weight="400" letter-spacing="-0.3">sim: o</text>
  <text x="800" y="192" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#4DB896" font-weight="400" letter-spacing="-0.3">fluxo</text>

  <!-- Bottom insight bar -->
  <rect x="44" y="340" width="812" height="1" fill="#1E3A5A"/>
  <rect x="44" y="365" width="812" height="72" rx="8" fill="#0A1A28" opacity="0.8"/>
  <rect x="44" y="365" width="4" height="72" rx="2" fill="#0F6E56"/>
  
  <text x="62" y="390" font-family="Georgia, 'Times New Roman', serif" font-size="13.5" fill="#9BB8C4" font-style="italic" letter-spacing="0.2">Insight central do case</text>
  <text x="62" y="413" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" fill="#E8F4F0" letter-spacing="-0.2">"Quando você tem uma folha em branco, a tentação é começar a preencher.</text>
  <text x="62" y="431" font-family="Georgia, 'Times New Roman', serif" font-size="14.5" fill="#4DB896" letter-spacing="-0.2">A decisão mais valiosa é resistir e fazer as perguntas certas antes de escrever qualquer coisa."</text>

  <!-- Signature -->
  <text x="856" y="505" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#2A4A5A" text-anchor="end" letter-spacing="0.5">samantha silva · portfólio</text>
</svg>
