<svg width="720" height="400" viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Processo de pesquisa da Niara: quatro métodos aplicados com 600 colaboradores ouvidos, 40 horas de testes, 24 horas de Design Sprint e 16 horas de entrevistas">
  <title>Processo de pesquisa — Niara, Banco Nacional</title>

  <!-- Fundo -->
  <rect width="720" height="400" rx="12" fill="#16213E"/>
  <rect width="720" height="400" rx="12" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>

  <!-- Grid pattern sutil -->
  <pattern id="grid04" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
  </pattern>
  <rect width="720" height="400" fill="url(#grid04)"/>

  <!-- Título -->
  <text x="36" y="48" font-family="Fraunces,Georgia,serif" font-size="22" fill="#fff" font-weight="500">600+ colaboradores ouvidos antes de escrever</text>
  <text x="36" y="68" font-family="DM Sans,sans-serif" font-size="12" fill="rgba(255,255,255,0.4)">uma única linha de conteúdo</text>

  <!-- Linha separadora -->
  <line x1="36" y1="82" x2="684" y2="82" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>

  <!-- Métricas grandes -->
  <text x="60" y="130" font-family="Fraunces,Georgia,serif" font-size="48" fill="#1A9B76" font-weight="500">600+</text>
  <text x="60" y="150" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">colaboradores ouvidos</text>

  <text x="222" y="130" font-family="Fraunces,Georgia,serif" font-size="48" fill="#1A9B76" font-weight="500">40h</text>
  <text x="222" y="150" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">de testes de conteúdo</text>

  <text x="374" y="130" font-family="Fraunces,Georgia,serif" font-size="48" fill="#1A9B76" font-weight="500">24h</text>
  <text x="374" y="150" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">de Design Sprint</text>

  <text x="516" y="130" font-family="Fraunces,Georgia,serif" font-size="48" fill="#1A9B76" font-weight="500">16h</text>
  <text x="516" y="150" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">de entrevistas em profundidade</text>

  <!-- Cards dos métodos -->
  <!-- Território Verbal -->
  <rect x="36" y="172" width="156" height="120" rx="8" fill="rgba(26,155,118,0.08)" stroke="rgba(26,155,118,0.2)" stroke-width="1"/>
  <text x="54" y="196" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76" font-weight="700" letter-spacing="1">TERRITÓRIO VERBAL</text>
  <text x="54" y="216" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">Mapeamos palavras e</text>
  <text x="54" y="232" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">atitudes do assistente</text>
  <text x="54" y="248" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">ideal, e o que as</text>
  <text x="54" y="264" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">pessoas rejeitavam.</text>

  <!-- Card Sorting -->
  <rect x="204" y="172" width="156" height="120" rx="8" fill="rgba(26,155,118,0.08)" stroke="rgba(26,155,118,0.2)" stroke-width="1"/>
  <text x="222" y="196" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76" font-weight="700" letter-spacing="1">CARD SORTING</text>
  <text x="222" y="216" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">Atributos de</text>
  <text x="222" y="232" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">personalidade ordenados</text>
  <text x="222" y="248" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">do mais ao menos</text>
  <text x="222" y="264" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">desejado.</text>

  <!-- Testes de conteúdo -->
  <rect x="372" y="172" width="156" height="120" rx="8" fill="rgba(26,155,118,0.08)" stroke="rgba(26,155,118,0.2)" stroke-width="1"/>
  <text x="390" y="196" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76" font-weight="700" letter-spacing="1">TESTES DE CONTEÚDO</text>
  <text x="390" y="216" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">Versões diferentes</text>
  <text x="390" y="232" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">de uma mesma mensagem</text>
  <text x="390" y="248" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">testadas com pessoas</text>
  <text x="390" y="264" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">reais.</text>

  <!-- Entrevistas -->
  <rect x="540" y="172" width="144" height="120" rx="8" fill="rgba(26,155,118,0.08)" stroke="rgba(26,155,118,0.2)" stroke-width="1"/>
  <text x="558" y="196" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76" font-weight="700" letter-spacing="1">ENTREVISTAS</text>
  <text x="558" y="216" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">Conversas longas</text>
  <text x="558" y="232" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">para entender o estado</text>
  <text x="558" y="248" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">mental no momento</text>
  <text x="558" y="264" font-family="DM Sans,sans-serif" font-size="11" fill="rgba(255,255,255,0.62)">de uso.</text>

  <!-- Resultado box -->
  <rect x="36" y="308" width="648" height="64" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="56" y="332" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" font-weight="700" letter-spacing="1">APRENDIZADO CENTRAL</text>
  <text x="56" y="354" font-family="Fraunces,Georgia,serif" font-size="15" fill="rgba(255,255,255,0.78)" font-style="italic">"O tom de pegar na mão não fazia sentido. As pessoas queriam resposta rápida, não tutorial."</text>

  <!-- Resultado metrics -->
  <rect x="36" y="386" width="100" height="8" rx="4" fill="rgba(26,155,118,0.15)"/>
  <text x="86" y="393" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76">+64% conversas</text>
  <rect x="148" y="386" width="110" height="8" rx="4" fill="rgba(26,155,118,0.15)"/>
  <text x="203" y="393" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76">+25% share digital</text>
  <rect x="270" y="386" width="90" height="8" rx="4" fill="rgba(26,155,118,0.15)"/>
  <text x="315" y="393" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76">+9pp acurácia</text>
  <rect x="372" y="386" width="110" height="8" rx="4" fill="rgba(26,155,118,0.15)"/>
  <text x="427" y="393" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#1A9B76">−11,5pp falso positivo</text>
</svg>
