<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:'Courier New',monospace;padding:16px;min-height:100vh}
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;min-height:420px}
@media(max-width:540px){.wrap{grid-template-columns:1fr;min-height:auto}}
.col{display:flex;flex-direction:column;gap:8px}
.phase-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;padding:0 2px}
.dot-l{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.before .dot-l{background:#C47070}.after .dot-l{background:#0F6E56}
.before .phase-label{color:#C47070}.after .phase-label{color:#4DB896}
.phone{background:#F0F2F5;border-radius:12px;overflow:hidden;flex:1;display:flex;flex-direction:column;border:1.5px solid #DDE1E7}
.chat-header{background:#fff;padding:8px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #E4E6EB;flex-shrink:0}
.chat-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.before .chat-av{background:#1877F2}.after .chat-av{background:#0F6E56}
.chat-name{font-size:11px;color:#1C1E21;font-weight:600;line-height:1.2}
.chat-sub{font-size:9px;color:#65676B}
.chat-area{flex:1;padding:10px;display:flex;flex-direction:column;gap:6px;background:#E9EBEE;overflow:hidden}
.bub{max-width:88%;padding:7px 11px;font-size:11px;line-height:1.5;opacity:0;transform:translateY(6px);transition:opacity 0.35s ease,transform 0.35s ease;word-break:break-word}
.bub.show{opacity:1;transform:none}
.bub-u{background:#0084FF;color:#fff;align-self:flex-end;border-radius:16px 16px 4px 16px}
.bub-b{background:#fff;color:#1C1E21;align-self:flex-start;border-radius:16px 16px 16px 4px}
.bub-b.bad{border-left:3px solid #E24B4A}
.bub-b.c1{border-left:3px solid #0F6E56}
.bub-b.c2{border-left:3px solid #BA7517}
.bub-b.c3{border-left:3px solid #888780}
.val{color:#0F6E56;font-weight:700}
.tag{padding:6px 10px;font-size:10px;opacity:0;transition:opacity 0.4s;margin-top:2px;line-height:1.5;border-radius:0 8px 8px 0}
.tag.show{opacity:1}
.tag-bad{background:#FEF2F2;border-left:2px solid #E24B4A;color:#991B1B;font-style:italic}
.tag-good{background:#F0FDF4;border-left:2px solid #0F6E56;color:#085041}
.tag-good span{color:#65676B;display:block;margin-top:2px;font-size:9px}
.scen-label{font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:#65676B;padding:3px 8px;background:#E4E6EB;border-radius:20px;align-self:center;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.scen-label.show{opacity:1}
</style></head>
<body>
<div class="wrap">
  <div class="col before">
    <div class="phase-label"><div class="dot-l"></div><span id="txt-before">before</span></div>
    <div class="phone">
      <div class="chat-header"><div class="chat-av">B</div><div><div class="chat-name" id="txt-bank-name">Digital Bank</div><div class="chat-sub" id="txt-bank-sub">Virtual assistant</div></div></div>
      <div class="chat-area">
        <div class="bub bub-u" id="b1"></div>
        <div class="bub bub-b bad" id="b2"></div>
        <div class="bub bub-u" id="b3"></div>
        <div class="bub bub-b bad" id="b4"></div>
        <div class="bub bub-u" id="b5"></div>
        <div class="tag tag-bad" id="t-bad"></div>
      </div>
    </div>
  </div>
  <div class="col after">
    <div class="phase-label"><div class="dot-l"></div><span id="txt-after">after · three scenarios</span></div>
    <div class="phone">
      <div class="chat-header"><div class="chat-av">B</div><div><div class="chat-name" id="txt-bank-name2">Digital Bank</div><div class="chat-sub" id="txt-bank-sub2">Virtual assistant</div></div></div>
      <div class="chat-area">
        <div class="bub bub-u" id="a1"></div>
        <div class="scen-label" id="sl1"></div>
        <div class="bub bub-b c1" id="a2"></div>
        <div class="scen-label" id="sl2"></div>
        <div class="bub bub-b c2" id="a3"></div>
        <div class="scen-label" id="sl3"></div>
        <div class="bub bub-b c3" id="a4"></div>
        <div class="tag tag-good" id="t-good"></div>
      </div>
    </div>
  </div>
</div>
<script>
var strings = {
  en: {
    before: 'before',
    after: 'after · three scenarios',
    bankName: 'Digital Bank',
    bankSub: 'Virtual assistant',
    b1: 'When will my credit card arrive?',
    b2: 'The delivery timeframe is 7 to 10 business days after the request.',
    b3: "It's been 8 days. Has it arrived?",
    b4: 'The timeframe may vary by region. If in doubt, contact our support center.',
    b5: 'But I asked when MY card arrives...',
    tBad: '"Asked when the card arrives. Not what the standard timeframe is."',
    a1: 'When will my credit card arrive?',
    sl1: 'scenario 1 · full API',
    a2pre: 'Your Mastercard Gold was requested on Jan 12. Expected by: ',
    a2val: 'Jan 22',
    a2post: '. Track it here.',
    sl2: 'scenario 2 · partial API',
    a3pre: 'Requested on Jan 12. Considering 7 business days, arrives by ',
    a3val: 'Jan 22',
    a3post: '. Is it past the deadline?',
    sl3: 'scenario 3 · no API',
    a4: 'Timeframe: 7 business days after request. E.g.: Monday → arrives by Wednesday. Is it past the deadline?',
    tGoodMain: 'even without API, you can deliver something much better',
    tGoodSub: 'the difference is in answering the right question'
  },
  pt: {
    before: 'antes',
    after: 'depois · três cenários',
    bankName: 'Banco Digital',
    bankSub: 'Assistente virtual',
    b1: 'Quando meu cartão de crédito vai chegar?',
    b2: 'O prazo de entrega é de 7 a 10 dias úteis após a solicitação.',
    b3: 'Já faz 8 dias. Chegou?',
    b4: 'O prazo pode variar por região. Em caso de dúvida, entre em contato com nossa central.',
    b5: 'Mas eu perguntei quando O MEU cartão chega...',
    tBad: '"Perguntou quando o cartão chega. Não qual é o prazo padrão."',
    a1: 'Quando meu cartão de crédito vai chegar?',
    sl1: 'cenário 1 · API completa',
    a2pre: 'Seu Mastercard Gold foi solicitado em 12/01. Previsão: ',
    a2val: '22/01',
    a2post: '. Rastreie aqui.',
    sl2: 'cenário 2 · API parcial',
    a3pre: 'Solicitado em 12/01. Considerando 7 dias úteis, chega até ',
    a3val: '22/01',
    a3post: '. Já passou do prazo?',
    sl3: 'cenário 3 · sem API',
    a4: 'Prazo: 7 dias úteis após o pedido. Ex.: segunda → chega até quarta. Já passou do prazo?',
    tGoodMain: 'mesmo sem API, dá pra entregar algo muito melhor',
    tGoodSub: 'a diferença está em responder a pergunta certa'
  }
};

var currentLang = 'pt';

function applyAnimLang(lang) {
  currentLang = lang;
  var s = strings[lang] || strings.pt;
  document.getElementById('txt-before').textContent = s.before;
  document.getElementById('txt-after').textContent = s.after;
  document.getElementById('txt-bank-name').textContent = s.bankName;
  document.getElementById('txt-bank-sub').textContent = s.bankSub;
  document.getElementById('txt-bank-name2').textContent = s.bankName;
  document.getElementById('txt-bank-sub2').textContent = s.bankSub;
  document.getElementById('b1').textContent = s.b1;
  document.getElementById('b2').textContent = s.b2;
  document.getElementById('b3').textContent = s.b3;
  document.getElementById('b4').textContent = s.b4;
  document.getElementById('b5').textContent = s.b5;
  document.getElementById('t-bad').textContent = s.tBad;
  document.getElementById('a1').textContent = s.a1;
  document.getElementById('sl1').textContent = s.sl1;
  document.getElementById('a2').innerHTML = s.a2pre + '<span class="val">' + s.a2val + '</span>' + s.a2post;
  document.getElementById('sl2').textContent = s.sl2;
  document.getElementById('a3').innerHTML = s.a3pre + '<span class="val">' + s.a3val + '</span>' + s.a3post;
  document.getElementById('sl3').textContent = s.sl3;
  document.getElementById('a4').textContent = s.a4;
  document.getElementById('t-good').innerHTML = s.tGoodMain + '<span>' + s.tGoodSub + '</span>';
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'setLang') {
    applyAnimLang(e.data.lang);
  }
});

applyAnimLang(currentLang);

function show(id){const el=document.getElementById(id);if(el)el.classList.add('show')}
const seq=[
  ()=>{show('b1');show('a1')},
  ()=>show('b2'),
  ()=>{show('sl1');show('a2')},
  ()=>show('b3'),
  ()=>{show('sl2');show('a3')},
  ()=>show('b4'),
  ()=>{show('sl3');show('a4')},
  ()=>show('b5'),
  ()=>show('t-bad'),
  ()=>show('t-good'),
];
const delays=[400,1100,1400,2200,2600,3400,3800,4600,5400,5400];
function run(){seq.forEach((fn,i)=>setTimeout(fn,delays[i]));setTimeout(reset,10000);}
function reset(){['b1','b2','b3','b4','b5','a1','a2','a3','a4','sl1','sl2','sl3','t-bad','t-good'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('show')});setTimeout(run,700);}
run();
</script>
<script>
function notifyHeight(){
  var h = document.body.scrollHeight || document.documentElement.scrollHeight;
  window.parent.postMessage({iframeHeight: h}, '*');
}
window.addEventListener('load', notifyHeight);
window.addEventListener('resize', notifyHeight);
setTimeout(notifyHeight, 500);
setTimeout(notifyHeight, 1500);
</script>
</body></html>
